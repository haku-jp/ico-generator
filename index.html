<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICO Generator — App Icon Maker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #252535;
    --accent: #e8ff47;
    --accent2: #7b5ea7;
    --text: #e8e8f0;
    --muted: #5a5a72;
    --danger: #ff4757;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(123,94,167,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(123,94,167,0.05) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  header {
    display: flex;
    align-items: flex-end;
    gap: 16px;
    margin-bottom: 56px;
  }

  .logo-mark {
    width: 48px;
    height: 48px;
    background: var(--accent);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(28px, 5vw, 42px);
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1;
    color: var(--text);
  }

  h1 span { color: var(--accent); }

  .subtitle {
    color: var(--muted);
    font-size: 12px;
    margin-left: auto;
    text-align: right;
    line-height: 1.5;
  }

  .layout {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 24px;
  }

  @media (max-width: 820px) {
    .layout { grid-template-columns: 1fr; }
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }

  .panel-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-header::before {
    content: '';
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    flex-shrink: 0;
  }

  .panel-body { padding: 20px; }

  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--accent);
    background: rgba(232,255,71,0.04);
  }

  .upload-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .upload-icon { font-size: 36px; margin-bottom: 12px; }

  .upload-zone p {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
  }

  .upload-zone strong { color: var(--accent); font-weight: 500; }

  #source-preview-wrap {
    display: none;
    position: relative;
    margin-bottom: 16px;
  }

  #source-preview-wrap img {
    width: 100%;
    border-radius: 10px;
    border: 1px solid var(--border);
    max-height: 220px;
    object-fit: contain;
    background: repeating-conic-gradient(#1a1a26 0% 25%, #0f0f1a 0% 50%) 0 0 / 16px 16px;
  }

  .btn-remove {
    position: absolute;
    top: 8px;
    right: 8px;
    background: var(--danger);
    border: none;
    border-radius: 6px;
    color: #fff;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 4px 10px;
    cursor: pointer;
  }

  .sizes-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 20px;
  }

  .size-chip {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 4px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }

  .size-chip input[type="checkbox"] { display: none; }

  .size-chip.checked {
    background: rgba(232,255,71,0.08);
    border-color: var(--accent);
    color: var(--accent);
  }

  .size-chip .px { font-size: 13px; font-weight: 500; }
  .size-chip .label { font-size: 9px; color: var(--muted); margin-top: 2px; }

  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }

  .setting-row:last-child { border-bottom: none; }
  .setting-row label { color: var(--muted); }

  .setting-row select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 4px 8px;
    outline: none;
  }

  input[type="range"] {
    -webkit-appearance: none;
    width: 100px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
    border: none;
    padding: 0;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    background: var(--accent);
    border-radius: 50%;
  }

  .range-val {
    font-size: 11px;
    color: var(--accent);
    min-width: 28px;
    text-align: right;
  }

  .color-row { display: flex; align-items: center; gap: 8px; }

  input[type="color"] {
    width: 28px;
    height: 28px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: none;
    cursor: pointer;
    padding: 2px;
  }

  .btn-generate {
    width: 100%;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-generate:disabled { opacity: 0.4; cursor: not-allowed; }

  .preview-grid { display: flex; flex-direction: column; gap: 16px; }

  .preview-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    background: var(--bg);
    border-radius: 10px;
    border: 1px solid var(--border);
  }

  .preview-canvas-wrap {
    background: repeating-conic-gradient(#1a1a26 0% 25%, #0f0f1a 0% 50%) 0 0 / 10px 10px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .preview-canvas-wrap canvas { display: block; image-rendering: pixelated; }
  .preview-info { flex: 1; }
  .preview-size { font-size: 13px; font-weight: 500; }
  .preview-desc { font-size: 10px; color: var(--muted); margin-top: 2px; }

  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--muted);
    font-size: 12px;
    line-height: 1.8;
  }

  .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }

  .download-wrap { display: none; margin-top: 20px; }

  .btn-download {
    width: 100%;
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 10px;
    padding: 12px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .file-info { font-size: 10px; color: var(--muted); text-align: center; margin-top: 8px; }

  .status { font-size: 11px; padding: 8px 12px; border-radius: 6px; margin-top: 10px; display: none; }
  .status.success { background: rgba(232,255,71,0.1); color: var(--accent); border: 1px solid rgba(232,255,71,0.2); display: block; }
  .status.error { background: rgba(255,71,87,0.1); color: var(--danger); border: 1px solid rgba(255,71,87,0.2); display: block; }

  .all-sizes-btn {
    font-size: 10px;
    color: var(--accent);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    font-family: 'DM Mono', monospace;
    text-decoration: underline;
    margin-bottom: 12px;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo-mark">🪟</div>
    <h1>ICO <span>Generator</span></h1>
    <div class="subtitle">Windows用アイコン生成<br>無料・完全ブラウザ処理</div>
  </header>

  <div class="layout">
    <div>
      <div class="panel" style="margin-bottom:20px">
        <div class="panel-header">画像をアップロード</div>
        <div class="panel-body">
          <div id="source-preview-wrap">
            <img id="source-img" src="" alt="source">
            <button class="btn-remove" onclick="clearImage()">✕ 削除</button>
          </div>
          <div class="upload-zone" id="upload-zone">
            <input type="file" id="file-input" accept="image/*">
            <div class="upload-icon">🖼️</div>
            <p><strong>クリック</strong>または<strong>ドラッグ&ドロップ</strong><br>PNG / JPG / SVG / WebP 対応<br>透過PNG推奨</p>
          </div>
        </div>
      </div>

      <div class="panel" style="margin-bottom:20px">
        <div class="panel-header">出力サイズ選択</div>
        <div class="panel-body">
          <button class="all-sizes-btn" onclick="toggleAll()">すべて選択 / 解除</button>
          <div class="sizes-grid" id="sizes-grid"></div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">変換設定</div>
        <div class="panel-body">
          <div class="setting-row">
            <label>リサイズ方法</label>
            <select id="resize-method">
              <option value="cover">Cover（切り抜き）</option>
              <option value="contain" selected>Contain（全体表示）</option>
              <option value="stretch">Stretch（引き伸ばし）</option>
            </select>
          </div>
          <div class="setting-row">
            <label>背景色</label>
            <div class="color-row">
              <input type="color" id="bg-color" value="#000000">
              <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
                <input type="checkbox" id="transparent-bg" checked onchange="toggleBg()">
                <span style="font-size:11px">透過</span>
              </label>
            </div>
          </div>
          <div class="setting-row">
            <label>角丸（px）</label>
            <div style="display:flex;align-items:center;gap:10px">
              <input type="range" id="corner-radius" min="0" max="50" value="0" oninput="document.getElementById('radius-val').textContent=this.value">
              <span class="range-val" id="radius-val">0</span>
            </div>
          </div>
          <div class="setting-row">
            <label>パディング（%）</label>
            <div style="display:flex;align-items:center;gap:10px">
              <input type="range" id="padding" min="0" max="40" value="0" oninput="document.getElementById('pad-val').textContent=this.value">
              <span class="range-val" id="pad-val">0</span>
            </div>
          </div>
        </div>
      </div>

      <button class="btn-generate" id="btn-generate" onclick="generate()" disabled>
        ⚙️ ICOファイルを生成
      </button>
      <div class="status" id="status"></div>

      <div class="download-wrap" id="download-wrap">
        <button class="btn-download" id="btn-download">
          ⬇️ .ico ファイルをダウンロード
        </button>
        <div class="file-info" id="file-info"></div>
      </div>
    </div>

    <div>
      <div class="panel" style="position:sticky;top:20px">
        <div class="panel-header">プレビュー</div>
        <div class="panel-body">
          <div id="preview-container">
            <div class="empty-state">
              <div class="empty-icon">🎯</div>
              画像をアップロードして<br>生成ボタンを押すと<br>ここにプレビューが表示されます
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const SIZES = [
  { px: 16, label: 'Taskbar' },
  { px: 24, label: 'Small' },
  { px: 32, label: 'Desktop' },
  { px: 48, label: 'Medium' },
  { px: 64, label: 'Large' },
  { px: 96, label: 'XL' },
  { px: 128, label: 'Shell' },
  { px: 256, label: 'HD' },
];

const DEFAULT_CHECKED = [16, 32, 48, 256];
let sourceImg = null;
let icoBlob = null;
let allChecked = true;

const grid = document.getElementById('sizes-grid');
SIZES.forEach(s => {
  const chip = document.createElement('label');
  chip.className = 'size-chip' + (DEFAULT_CHECKED.includes(s.px) ? ' checked' : '');
  chip.innerHTML = `<input type="checkbox" ${DEFAULT_CHECKED.includes(s.px) ? 'checked' : ''}><div class="px">${s.px}</div><div class="label">${s.label}</div>`;
  chip.querySelector('input').addEventListener('change', e => chip.classList.toggle('checked', e.target.checked));
  grid.appendChild(chip);
});

function toggleAll() {
  allChecked = !allChecked;
  document.querySelectorAll('.size-chip').forEach(c => {
    c.classList.toggle('checked', allChecked);
    c.querySelector('input').checked = allChecked;
  });
}

function toggleBg() {
  document.getElementById('bg-color').disabled = document.getElementById('transparent-bg').checked;
}

const fileInput = document.getElementById('file-input');
const uploadZone = document.getElementById('upload-zone');

fileInput.addEventListener('change', e => loadFile(e.target.files[0]));
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});

function loadFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      sourceImg = img;
      document.getElementById('source-img').src = ev.target.result;
      document.getElementById('source-preview-wrap').style.display = 'block';
      uploadZone.style.display = 'none';
      document.getElementById('btn-generate').disabled = false;
      resetDownload();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function clearImage() {
  sourceImg = null;
  document.getElementById('source-preview-wrap').style.display = 'none';
  uploadZone.style.display = 'block';
  fileInput.value = '';
  document.getElementById('btn-generate').disabled = true;
  resetDownload();
  document.getElementById('preview-container').innerHTML = `<div class="empty-state"><div class="empty-icon">🎯</div>画像をアップロードして<br>生成ボタンを押すと<br>ここにプレビューが表示されます</div>`;
  document.getElementById('status').className = 'status';
}

function resetDownload() {
  icoBlob = null;
  document.getElementById('download-wrap').style.display = 'none';
}

function renderToCanvas(size) {
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');
  const transparent = document.getElementById('transparent-bg').checked;
  const bgColor = document.getElementById('bg-color').value;
  const method = document.getElementById('resize-method').value;
  const radius = parseInt(document.getElementById('corner-radius').value);
  const padding = parseInt(document.getElementById('padding').value) / 100;

  if (!transparent) { ctx.fillStyle = bgColor; ctx.fillRect(0, 0, size, size); }

  const r = (radius / 100) * size;
  if (r > 0) {
    ctx.beginPath();
    ctx.roundRect(0, 0, size, size, r);
    ctx.clip();
    if (!transparent) { ctx.fillStyle = bgColor; ctx.fill(); }
  }

  const pad = size * padding;
  const dstX = pad, dstY = pad, dstW = size - pad * 2, dstH = size - pad * 2;
  const iW = sourceImg.naturalWidth, iH = sourceImg.naturalHeight;

  if (method === 'cover') {
    const scale = Math.max(dstW / iW, dstH / iH);
    const sw = dstW / scale, sh = dstH / scale;
    const sx = (iW - sw) / 2, sy = (iH - sh) / 2;
    ctx.drawImage(sourceImg, sx, sy, sw, sh, dstX, dstY, dstW, dstH);
  } else if (method === 'contain') {
    const scale = Math.min(dstW / iW, dstH / iH);
    const rW = iW * scale, rH = iH * scale;
    ctx.drawImage(sourceImg, 0, 0, iW, iH, dstX + (dstW - rW) / 2, dstY + (dstH - rH) / 2, rW, rH);
  } else {
    ctx.drawImage(sourceImg, 0, 0, iW, iH, dstX, dstY, dstW, dstH);
  }
  return canvas;
}

function buildIco(canvases) {
  const pngDatas = canvases.map(c => {
    const b64 = c.toDataURL('image/png').split(',')[1];
    const bin = atob(b64);
    const arr = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
    return arr;
  });

  const count = canvases.length;
  const totalHeader = 6 + count * 16;
  const offsets = [];
  let offset = totalHeader;
  for (const png of pngDatas) { offsets.push(offset); offset += png.length; }

  const buf = new ArrayBuffer(offset);
  const view = new DataView(buf);
  view.setUint16(0, 0, true);
  view.setUint16(2, 1, true);
  view.setUint16(4, count, true);

  canvases.forEach((c, i) => {
    const pos = 6 + i * 16;
    const s = c.width;
    view.setUint8(pos, s === 256 ? 0 : s);
    view.setUint8(pos + 1, s === 256 ? 0 : s);
    view.setUint8(pos + 2, 0);
    view.setUint8(pos + 3, 0);
    view.setUint16(pos + 4, 1, true);
    view.setUint16(pos + 6, 32, true);
    view.setUint32(pos + 8, pngDatas[i].length, true);
    view.setUint32(pos + 12, offsets[i], true);
  });

  const u8 = new Uint8Array(buf);
  pngDatas.forEach((png, i) => u8.set(png, offsets[i]));
  return new Blob([buf], { type: 'image/x-icon' });
}

function generate() {
  const selected = [...document.querySelectorAll('.size-chip.checked')].map(c => parseInt(c.querySelector('.px').textContent));
  if (selected.length === 0) { showStatus('サイズを1つ以上選択してください', 'error'); return; }
  if (!sourceImg) { showStatus('画像をアップロードしてください', 'error'); return; }

  try {
    const canvases = selected.map(s => renderToCanvas(s));
    const container = document.getElementById('preview-container');
    container.innerHTML = '<div class="preview-grid"></div>';
    const previewGrid = container.querySelector('.preview-grid');
    const SIZE_DESCS = {16:'タスクバー',24:'小アイコン',32:'デスクトップ',48:'中アイコン',64:'大アイコン',96:'エクストラ',128:'シェル',256:'高解像度'};

    canvases.forEach((c, i) => {
      const sz = selected[i];
      const dispSz = Math.min(sz, 96);
      const item = document.createElement('div');
      item.className = 'preview-item';
      const wrap = document.createElement('div');
      wrap.className = 'preview-canvas-wrap';
      wrap.style.width = (dispSz + 8) + 'px';
      wrap.style.height = (dispSz + 8) + 'px';
      const previewC = document.createElement('canvas');
      previewC.width = sz; previewC.height = sz;
      previewC.style.width = dispSz + 'px'; previewC.style.height = dispSz + 'px';
      previewC.getContext('2d').drawImage(c, 0, 0);
      wrap.appendChild(previewC);
      item.innerHTML = `<div class="preview-info"><div class="preview-size">${sz}×${sz} px</div><div class="preview-desc">${SIZE_DESCS[sz] || ''}</div></div>`;
      item.prepend(wrap);
      previewGrid.appendChild(item);
    });

    icoBlob = buildIco(canvases);
    const kb = (icoBlob.size / 1024).toFixed(1);
    document.getElementById('btn-download').onclick = () => {
      const url = URL.createObjectURL(icoBlob);
      const a = document.createElement('a');
      a.href = url; a.download = 'app-icon.ico'; a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    };
    document.getElementById('file-info').textContent = `${selected.length}サイズ収録 / ${kb} KB`;
    document.getElementById('download-wrap').style.display = 'block';
    showStatus(`✓ 生成完了！${selected.length}種類のサイズを含む ICO ファイルが作成されました`, 'success');
  } catch(e) {
    showStatus('エラー: ' + e.message, 'error');
  }
}

function showStatus(msg, type) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status ' + type;
}
</script>
</body>
</html>
